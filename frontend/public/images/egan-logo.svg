<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120" fill="none">
  <!-- Icon Mark: Geometric "E" with code-bracket and network themes -->
  <g transform="translate(10, 10)">
    <!-- Hexagonal background shield -->
    <polygon points="50,0 100,0 125,43 100,86 50,86 25,43" fill="#1e3a8a" opacity="0.08"/>
    
    <!-- Left code bracket -->
    <path d="M35 28 L25 38 L25 48 L35 58" stroke="#1e3a8a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Right code bracket (partial) -->
    <path d="M55 24 L65 34 L65 52 L55 62" stroke="#1e3a8a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Diamond/chevron center -->
    <polygon points="45,43 55,33 65,43 55,53" fill="#2563eb"/>
    
    <!-- Green network dot - left -->
    <circle cx="30" cy="65" r="4" fill="#16a34a"/>
    <!-- Green network dot - top -->
    <circle cx="52" cy="18" r="3.5" fill="#16a34a"/>
    <!-- Green network dot - right -->
    <circle cx="72" cy="50" r="3" fill="#16a34a"/>
    <!-- Green network dot - bottom -->
    <circle cx="50" cy="75" r="3" fill="#16a34a"/>
    
    <!-- Connecting lines (network theme) -->
    <line x1="30" y1="65" x2="52" y2="18" stroke="#16a34a" stroke-width="2" opacity="0.7"/>
    <line x1="52" y1="18" x2="72" y2="50" stroke="#16a34a" stroke-width="2" opacity="0.7"/>
    <line x1="52" y1="18" x2="50" y2="75" stroke="#16a34a" stroke-width="2" opacity="0.5"/>
    <line x1="72" y1="50" x2="50" y2="75" stroke="#16a34a" stroke-width="2" opacity="0.6"/>
    
    <!-- Growth arrow -->
    <line x1="72" y1="18" x2="92" y2="8" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
    <polygon points="92,8 83,13 88,18" fill="#16a34a"/>
  </g>

  <!-- Wordmark: E-GAN -->
  <text x="140" y="62" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="42" font-weight="900" fill="#1e3a8a" letter-spacing="-1">E-GAN</text>
  
  <!-- TECH sublabel -->
  <text x="140" y="90" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a" letter-spacing="8">TECH</text>

  <!-- Thin underline accent -->
  <line x1="140" y1="98" x2="310" y2="98" stroke="#16a34a" stroke-width="2" opacity="0.3"/>
</svg>
